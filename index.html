<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verity Inside Trainer</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<header>

<h1>VERITY</h1>

<h2>Inside Room Trainer</h2>

<button id="newEncounter">
New Encounter
</button>

</header>





<section class="panel">

<h3>Statues</h3>


<div class="statues">


<div class="statue-card">

<p>You</p>

<div id="yourStatue" class="shape">
?
</div>

</div>



<div class="statue-card">

<p>Guardian A</p>

<div id="guardianAStatue" class="shape">
?
</div>

</div>



<div class="statue-card">

<p>Guardian B</p>

<div id="guardianBStatue" class="shape">
?
</div>

</div>


</div>


</section>







<section class="panel">


<h3>Your Shapes</h3>


<div class="inventory">


<button id="inventory1" class="shape-button">
?
</button>


<button id="inventory2" class="shape-button">
?
</button>


</div>


</section>







<section class="panel">


<h3>Send Selected Shape To</h3>


<div class="guardians">


<button id="guardian1">

Guardian A

</button>



<button id="guardian2">

Guardian B

</button>


</div>


</section>







<section class="panel">


<h3>Status</h3>


<div id="status">

Press New Encounter

</div>


</section>







<section class="panel">


<h3>Encounter Log</h3>


<div id="log">

</div>


</section>







<section class="panel">


<button id="hint">

Hint

</button>



<button id="reveal">

Reveal Hidden State

</button>



<button id="reset">

Clear Selection

</button>


</section>







<section class="panel">


<h3>Stats</h3>


<p>
Solves:
<span id="solves">0</span>
</p>


<p>
Best Time:
<span id="bestTime">--</span>
</p>


<p>
Time:
<span id="timer">0</span>s
</p>


</section>





</div>



<script src="script.js"></script>


</body>

</html>
