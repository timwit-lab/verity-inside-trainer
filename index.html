<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Verity Inside Room Trainer</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>VERITY</h1>
        <h2>Inside Room Trainer</h2>

        <div class="controls">

            <button id="newEncounter">
                New Encounter
            </button>

            <select id="mode">

                <option value="training">
                    Training Mode
                </option>

                <option value="raid">
                    Raid Mode
                </option>

                <option value="expert">
                    Expert Mode
                </option>

            </select>

        </div>

    </header>


    <section class="panel">

        <h3>Your Room</h3>

        <div class="room">

            <div class="statue-area">

                <p>Your Statue</p>

                <div id="yourStatue" class="shape">
                    ?
                </div>

            </div>


            <div class="inventory-area">

                <p>Your Inventory</p>

                <div class="inventory">

                    <button id="inventory1" class="shape-button">
                        ?
                    </button>

                    <button id="inventory2" class="shape-button">
                        ?
                    </button>

                </div>

            </div>

        </div>

    </section>



    <section class="panel">

        <h3>Other Guardians</h3>


        <div class="guardians">


            <button id="guardian1" class="guardian">

                <div>
                    Guardian A
                </div>

                <div id="guardianStatue1" class="small-shape">
                    ?
                </div>

            </button>



            <button id="guardian2" class="guardian">

                <div>
                    Guardian B
                </div>

                <div id="guardianStatue2" class="small-shape">
                    ?
                </div>

            </button>


        </div>


    </section>




    <section class="panel">

        <h3>Status</h3>

        <div id="status">
            Press New Encounter
        </div>

    </section>




    <section class="panel">

        <h3>Encounter Log</h3>

        <div id="log">

        </div>

    </section>




    <section class="panel actions">

        <button id="hint">
            Hint
        </button>

        <button id="reveal">
            Reveal Solution
        </button>

        <button id="reset">
            Reset Selection
        </button>

    </section>




    <section class="panel stats">

        <h3>Stats</h3>

        <p>
            Solves:
            <span id="solves">0</span>
        </p>

        <p>
            Best Time:
            <span id="bestTime">--</span>
        </p>

        <p>
            Time:
            <span id="timer">0</span>s
        </p>

    </section>


</div>



<script src="script.js"></script>

</body>

</html>
