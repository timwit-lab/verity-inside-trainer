<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verity Inside Trainer</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<header>

<h1>VERITY</h1>

<h2>Inside Room Trainer</h2>

<button id="newEncounter">
New Encounter
</button>

</header>





<section class="panel">


<h3>Your Room</h3>


<div class="room">


<div class="statue-area">


<p>Your Statue</p>


<div id="yourStatue" class="shape">

?

</div>


</div>





<div class="inventory-area">


<p>Your Shapes</p>


<div class="inventory">


<button id="inventory1" class="shape-button">

?

</button>



<button id="inventory2" class="shape-button">

?

</button>


</div>


</div>



</div>


</section>







<section class="panel">


<h3>Send Shape To</h3>


<div class="guardians">


<button id="guardian1" class="guardian">


Guardian A


</button>




<button id="guardian2" class="guardian">


Guardian B


</button>


</div>


<p class="info">

Choose which guardian receives the selected shape.

</p>


</section>







<section class="panel">


<h3>Status</h3>


<div id="status">

Press New Encounter

</div>


</section>







<section class="panel">


<h3>Encounter Log</h3>


<div id="log">


</div>


</section>







<section class="panel actions">


<button id="hint">

Hint

</button>



<button id="reveal">

Reveal Hidden State

</button>



<button id="reset">

Clear Selection

</button>


</section>







<section class="panel stats">


<h3>Stats</h3>


<p>

Solves:
<span id="solves">
0
</span>

</p>



<p>

Best Time:
<span id="bestTime">
--
</span>

</p>



<p>

Time:
<span id="timer">
0
</span>s

</p>



</section>





</div>



<script src="script.js"></script>


</body>

</html>
